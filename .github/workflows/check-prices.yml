name: Check fuel prices

on:
  schedule:
    # Every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Check prices and notify
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python notifier/check_prices_ntfy.py

      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notifier/last_prices.json
          git diff --staged --quiet || git commit -m "Update last_prices.json" && git push
